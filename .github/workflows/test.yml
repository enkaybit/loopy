name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: make test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: tools/loopy-taskd/go.sum

      - name: Run installer + CLI tests
        run: make test

      - name: Run loopy-taskd Go tests
        working-directory: tools/loopy-taskd
        run: go test ./...
